# =====================================================================
# PLEX MEDIA SERVER NETWORKING & FILESYSTEM OPTIMIZATIONS
# =====================================================================

# 1. Device Queue and Connection Backlogs
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192
net.ipv4.tcp_max_syn_backlog = 8192
net.ipv4.tcp_max_tw_buckets = 2000000

# 2. Memory Boundaries for Heavy Multi-Stream Video Buffering
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.optmem_max = 65536

net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# 3. Fast Connection Lifecycles & Timestamps for BBR WAN Streams
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 10
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.ip_local_port_range = 3000 65535
net.ipv4.tcp_timestamps = 1

# Keepalives
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 6
net.ipv4.tcp_mtu_probing = 1

# 4. Security Defaults
net.ipv4.tcp_syncookies = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.rp_filter = 1

# 5. PLEX SPECIFIC: Core Queue Discipline Pacing
# Changed from cake to fq to allow BBR to native-pace massive video assets smoothly
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# 6. PLEX SPECIFIC: Expand Filesystem Inotify Handles
# Allows Plex to automatically track up to 524,288 directories/files for instant library updates
fs.inotify.max_user_watches = 524288
