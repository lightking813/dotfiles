# ====================================================================
# PLEX PC NETWORK CONFIGURATION (Minimalist Performance & Security)
# ====================================================================

# 1. KEEP CAKE & BBR ACTIVE
# Essential for smooth remote streaming without lagging your home internet
net.core.default_qdisc = cake
net.ipv4.tcp_congestion_control = bbr

# 2. SECURITY HARDENING
# Protects against SYN flood attacks and IP spoofing
net.ipv4.tcp_syncookies = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.rp_filter = 1
